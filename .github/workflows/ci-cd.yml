name: CI/CD Book Store

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  build_and_test:
    name: Build and Lint Test (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        run: npm run lint

      - name: Build Next.js Static Export
        run: npm run build

      - name: Upload Build Artifacts
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: static-export
          path: out/
          retention-days: 1

  deploy:
    name: Deploy to Firebase Hosting (CD)
    needs: build_and_test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: static-export
          path: out/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BOOKSTORE_10C25 }}'
          projectId: bookstore-10c25
          channelId: live
